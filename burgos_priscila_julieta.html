<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspadita YPF Infinia - Gas Impulso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap');
  :root {{ --ypf-blue: #003DA5; --ypf-gold: #C8973A; --white: #ffffff; --light-bg: #f0f4ff; }}
  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
  body {{ font-family: 'Open Sans', sans-serif; background: var(--light-bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }}
  .header {{ background: var(--ypf-blue); width: 100%; max-width: 420px; border-radius: 16px 16px 0 0; padding: 18px; text-align: center; color: white; }}
  .header h1 {{ font-family: 'Oswald', sans-serif; font-size: 1.6rem; color: var(--ypf-gold); letter-spacing: 1px; }}
  .header p {{ font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }}
  .card {{ background: white; width: 100%; max-width: 420px; border-radius: 0 0 16px 16px; box-shadow: 0 8px 30px rgba(0,61,165,0.15); padding: 24px; }}
  .scratch-area {{ position: relative; width: 100%; height: 180px; border-radius: 12px; overflow: hidden; margin-bottom: 20px; cursor: crosshair; border: 3px solid var(--ypf-gold); }}
  #prize-display {{ position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--ypf-blue); color: white; text-align: center; padding: 16px; z-index: 1; }}
  #prize-display .prize-emoji {{ font-size: 2.5rem; margin-bottom: 8px; }}
  #prize-display .prize-name {{ font-family: 'Oswald', sans-serif; font-size: 1.3rem; color: var(--ypf-gold); }}
  #prize-display .prize-code {{ font-size: 0.85rem; margin-top: 6px; opacity: 0.9; }}
  canvas {{ position: absolute; inset: 0; z-index: 2; touch-action: none; }}
  .hint {{ text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 16px; }}
  .form-group {{ margin-bottom: 14px; }}
  .form-group label {{ display: block; font-size: 0.82rem; color: #444; font-weight: 600; margin-bottom: 4px; }}
  .form-group input {{ width: 100%; padding: 10px 14px; border: 2px solid #dde3f5; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; outline: none; }}
  .form-group input:focus {{ border-color: var(--ypf-blue); }}
  .btn {{ width: 100%; padding: 14px; background: var(--ypf-gold); color: white; border: none; border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; margin-top: 8px; }}
  .btn:hover {{ background: #b8832a; }}
  .footer {{ margin-top: 16px; font-size: 0.72rem; color: #888; text-align: center; }}
  .msg-error {{ color: #c0392b; font-size: 0.82rem; text-align: center; margin-top: 8px; }}
  #form-section {{ display: block; }}
  #scratch-section {{ display: none; }}
  #result-section {{ display: none; text-align: center; padding: 10px 0; }}
  #result-section .big-emoji {{ font-size: 3rem; }}
  #result-section h2 {{ font-family: 'Oswald', sans-serif; color: var(--ypf-blue); font-size: 1.4rem; margin: 10px 0 4px; }}
  #result-section .code-box {{ background: var(--light-bg); border: 2px dashed var(--ypf-gold); border-radius: 10px; padding: 12px; font-size: 1.1rem; font-weight: 600; color: var(--ypf-blue); margin: 12px 0; letter-spacing: 2px; }}
  #result-section p {{ font-size: 0.85rem; color: #555; }}
</style>
</head>
<body>
<div class="header">
  <h1>⛽ RASPADITA INFINIA</h1>
  <p>Gas Impulso • Junio 2026</p>
</div>
<div class="card">
  <div id="form-section">
    <p style="text-align:center;font-size:0.9rem;color:#333;margin-bottom:16px;">Cargaste combustible Infinia. ¡Completá tus datos y descubrí tu premio!</p>
    <div class="form-group"><label>Nombre *</label><input type="text" id="inp-nombre" placeholder="Tu nombre" maxlength="50"></div>
    <div class="form-group"><label>Apellido *</label><input type="text" id="inp-apellido" placeholder="Tu apellido" maxlength="50"></div>
    <div class="form-group"><label>DNI *</label><input type="number" id="inp-dni" placeholder="Sin puntos" maxlength="8"></div>
    <div class="form-group"><label>Teléfono *</label><input type="tel" id="inp-tel" placeholder="Ej: 1134567890" maxlength="15"></div>
    <button class="btn" onclick="validarYJugar()">¡JUGAR AHORA!</button>
    <div id="form-msg"></div>
  </div>
  <div id="scratch-section">
    <p class="hint">🖐️ Deslizá el dedo para raspar y descubrir tu premio</p>
    <div class="scratch-area">
      <div id="prize-display">
        <div class="prize-emoji" id="pEmoji"></div>
        <div class="prize-name" id="pName"></div>
        <div class="prize-code" id="pCode"></div>
      </div>
      <canvas id="scratch-canvas"></canvas>
    </div>
  </div>
  <div id="result-section">
    <div class="big-emoji" id="res-emoji"></div>
    <h2 id="res-title"></h2>
    <div class="code-box" id="res-code"></div>
    <p id="res-desc"></p>
  </div>
  <div class="footer">Promoción válida del 5 al 30 de junio 2026 • Solo con carga de Infinia</div>
</div>
<script>
const VENDEDOR = "BURGOS PRISCILA JULIETA";
const ESTACION = "Gas Impulso";
const WEBHOOK = "https://script.google.com/macros/s/AKfycbwlJEEG4B7FsBaE3ODlOmaaO8hFc4ZpXslN4vJhAALEjwRhhu1JzrvvZAsPzysFYc-cEw/exec";
const PREMIOS = [
  {{id:'camiseta',nombre:'CAMISETA MESSI',emoji:'🏆',prob:0.05,desc:'Camiseta Adidas Messi Argentina 2022. Retirá en la estación con este código.'}},
  {{id:'cafe',nombre:'CAFÉ GRATIS',emoji:'☕',prob:0.30,desc:'Café gratis en nuestra tienda. Mostrá este código al cajero.'}},
  {{id:'aceite',nombre:'20% OFF ELAION',emoji:'🛢️',prob:0.65,desc:'20% de descuento en Elaion Auro 15W-40. Válido en esta visita.'}}
];
let premioSeleccionado=null,datosCliente={{}},revealed=false;
function validarYJugar(){{
  const hoy=new Date(),inicio=new Date('2026-06-05'),fin=new Date('2026-06-30T23:59:59');
  if(hoy<inicio||hoy>fin){{document.getElementById('form-msg').innerHTML='<p class="msg-error">La promoción no está activa en esta fecha.</p>';return;}}
  const nombre=document.getElementById('inp-nombre').value.trim();
  const apellido=document.getElementById('inp-apellido').value.trim();
  const dni=document.getElementById('inp-dni').value.trim();
  const tel=document.getElementById('inp-tel').value.trim();
  if(!nombre||!apellido||!dni||!tel){{document.getElementById('form-msg').innerHTML='<p class="msg-error">Completá todos los campos.</p>';return;}}
  if(dni.length<7||dni.length>8){{document.getElementById('form-msg').innerHTML='<p class="msg-error">DNI inválido.</p>';return;}}
  datosCliente={{nombre,apellido,dni,tel}};
  premioSeleccionado=sortear();
  premioSeleccionado.codigo=genCodigo();
  mostrarRaspadita();
}}
function sortear(){{const r=Math.random();let a=0;for(const p of PREMIOS){{a+=p.prob;if(r<a)return p;}}return PREMIOS[2];}}
function genCodigo(){{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<8;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}}
function mostrarRaspadita(){{
  document.getElementById('form-section').style.display='none';
  document.getElementById('scratch-section').style.display='block';
  document.getElementById('pEmoji').textContent=premioSeleccionado.emoji;
  document.getElementById('pName').textContent=premioSeleccionado.nombre;
  document.getElementById('pCode').textContent='Código: '+premioSeleccionado.codigo;
  initScratch();
}}
function initScratch(){{
  const canvas=document.getElementById('scratch-canvas');
  const area=canvas.parentElement;
  canvas.width=area.offsetWidth;canvas.height=area.offsetHeight;
  const ctx=canvas.getContext('2d');
  const g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  g.addColorStop(0,'#C8973A');g.addColorStop(1,'#a07020');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold 16px Oswald,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('✦ RASPÁ AQUÍ ✦',canvas.width/2,canvas.height/2-8);
  ctx.fillText('DESCUBRÍ TU PREMIO',canvas.width/2,canvas.height/2+18);
  ctx.globalCompositeOperation='destination-out';
  let painting=false;
  function getPos(e){{const rect=canvas.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{{x:src.clientX-rect.left,y:src.clientY-rect.top}};}}
  function scratch(e){{if(!painting)return;e.preventDefault();const {{x,y}}=getPos(e);ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();checkReveal(ctx,canvas);}}
  canvas.addEventListener('mousedown',e=>{{painting=true;scratch(e);}});
  canvas.addEventListener('mousemove',scratch);
  canvas.addEventListener('mouseup',()=>painting=false);
  canvas.addEventListener('touchstart',e=>{{painting=true;scratch(e);}},{{passive:false}});
  canvas.addEventListener('touchmove',scratch,{{passive:false}});
  canvas.addEventListener('touchend',()=>painting=false);
}}
function checkReveal(ctx,canvas){{
  if(revealed)return;
  const d=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let t=0;for(let i=3;i<d.length;i+=4)if(d[i]<128)t++;
  if(t/(canvas.width*canvas.height)>0.45){{revealed=true;canvas.style.display='none';setTimeout(registrar,500);}}
}}
function registrar(){{
  fetch(WEBHOOK,{{method:'POST',body:JSON.stringify({{nombre:datosCliente.nombre,apellido:datosCliente.apellido,dni:datosCliente.dni,telefono:datosCliente.tel,premio:premioSeleccionado.nombre,codigo:premioSeleccionado.codigo,vendedor:VENDEDOR,estacion:ESTACION}})}}).catch(()=>{{}});
  document.getElementById('scratch-section').style.display='none';
  const rs=document.getElementById('result-section');rs.style.display='block';
  document.getElementById('res-emoji').textContent=premioSeleccionado.emoji;
  document.getElementById('res-title').textContent='¡GANASTE '+premioSeleccionado.nombre+'!';
  document.getElementById('res-code').textContent=premioSeleccionado.codigo;
  document.getElementById('res-desc').textContent=premioSeleccionado.desc;
}}
</script>
</body>
</html>
